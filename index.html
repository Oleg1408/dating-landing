<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Local Singles</title>
<style>
  body {
    margin:0;
    font-family: Arial, sans-serif;
    /* Фон с размытием */
    background: url('https://mnt/data/a_digital_photograph_captures_two_african_american.png') no-repeat center center fixed;
    background-size: cover;
    color:white;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    position: relative;
  }

  /* Добавляем псевдоэлемент для размытия фона */
  body::before {
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: inherit;
    filter: blur(10px) brightness(0.6);
    z-index:0;
  }

  .container {
    position: relative;
    z-index:1; /* чтобы блок был поверх размытого фона */
    background: rgba(0,0,0,0.6);
    padding:40px;
    border-radius:20px;
    max-width:400px;
  }

  h1 {
    font-size:26px;
    margin-bottom:15px;
  }

  p {
    font-size:16px;
    margin-bottom:25px;
  }

  button {
    background: linear-gradient(90deg, #ff3366, #ff9933);
    border:none;
    padding:15px 30px;
    font-size:18px;
    color:white;
    border-radius:30px;
    cursor:pointer;
    transition: background 0.3s ease;
  }

  button:hover {
    background: linear-gradient(90deg, #ff0055, #ff6600);
  }

  a {
    text-decoration:none;
  }
</style>
</head>

<body>
<div class="container">

</body>
</html>
